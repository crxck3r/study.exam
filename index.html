<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculus Study Tool v2</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Navbar */
        nav { width: 100%; padding: 20px; background: var(--card); text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); }

        /* Search Bar */
        #search { margin: 20px; padding: 12px; width: 80%; max-width: 500px; border-radius: 8px; border: none; background: var(--card); color: white; }

        /* Game Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; width: 90%; max-width: 1200px; padding-bottom: 50px; }
        .card { background: var(--card); padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: transform 0.2s; border: 1px solid transparent; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 8px; background: #334155; aspect-ratio: 1/1; object-fit: cover; }

        /* Fullscreen Player */
        #player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 10px; right: 20px; background: red; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>

    const grid = document.getElementById('gameGrid');

    function loadGames() {
        grid.innerHTML = '';
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'card';
                        card.onclick = () => openGame(game.url);
            card.innerHTML = `
                <img src="${game.img || 'https://placeholder.com'}" alt="${game.name}">
                <div>${game.name}</div>
            `;
            grid.appendChild(card);
        });
    }

    function openGame(url) {
        document.getElementById('gameFrame').src = url;
        document.getElementById('player-container').style.display = 'block';
    }

    function closeGame() {
        document.getElementById('player-container').style.display = 'none';
        document.getElementById('gameFrame').src = '';
    }

    function filterGames() {
        let input = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for (i = 0; i < cards.length; i++) { 
            if (!cards[i].innerText.toLowerCase().includes(input)) {
                cards[i].style.display="none";
            } else {
                cards[i].style.display="block";                 
            }
        }
    }

    loadGames();
