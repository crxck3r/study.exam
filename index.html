<!DOCTYPE html>
<html>
<head>
    <title>My Study Portal</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: #1e1e1e; padding: 15px; border-radius: 8px; cursor: pointer; }
        iframe { width: 100%; height: 500px; border: none; display: none; }
    </style>
</head>
<body>
    <h1>Calculus Resources</h1>
    <div class="game-grid">
        <!-- Add more game cards here -->
        <div class="game-card" onclick="playGame('https://example.com')">
            <h3>Game 1</h3>
        </div>
    </div>
    <iframe id="gamePlayer"></iframe>

    <script>
        function playGame(url) {
            const player = document.getElementById('gamePlayer');
            player.src = url;
            player.style.display = 'block';
            window.scrollTo(0,document.body.scrollHeight);
        }
    </script>
</body>
</html>
